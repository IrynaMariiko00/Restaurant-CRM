name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  APP_NAME: restaurant-crm
  IMAGE_NAME: restaurant-crm
  APP_PORT: "3000"
  VITE_API_URL: https://accanto.adammudrak.pp.ua

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build Docker image
        if: github.event_name == 'push'
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://accanto.adammudrak.pp.ua' }}
        run: docker build -t "$IMAGE_NAME:latest" --build-arg VITE_API_URL="$VITE_API_URL" .

      - name: Export Docker image
        if: github.event_name == 'push'
        run: |
          mkdir -p deploy
          docker save "$IMAGE_NAME:latest" -o "deploy/$APP_NAME.tar"

      - name: Upload image to Hetzner
        if: github.event_name == 'push'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT || '22' }}
          HETZNER_DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          KEY_FILE="$HOME/.ssh/hetzner_deploy_key"
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          trim_value() {
            printf '%s' "$1" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }

          HOST="$(trim_value "$HETZNER_HOST")"
          PORT="$(trim_value "$HETZNER_PORT")"
          TARGET="$(trim_value "$HETZNER_DEPLOY_PATH")"

          rsync -rlgoDzvc \
            -e "ssh -p $PORT -i $KEY_FILE -o StrictHostKeyChecking=no" \
            deploy/ \
            "root@$HOST:$TARGET"

      - name: Restart container on Hetzner
        if: github.event_name == 'push'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT || '22' }}
          TARGET: ${{ secrets.HETZNER_DEPLOY_PATH }}
          DOCKER_NETWORK: ${{ secrets.HETZNER_DOCKER_NETWORK }}
        run: |
          set -euo pipefail
          trim_value() {
            printf '%s' "$1" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }

          DEPLOY_VARS="APP_NAME IMAGE_NAME APP_PORT TARGET DOCKER_NETWORK"
          for var in HETZNER_HOST HETZNER_PORT $DEPLOY_VARS; do
            printf -v "$var" '%s' "$(trim_value "${!var-}")"
          done

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          KEY_FILE="$HOME/.ssh/hetzner_deploy_key"
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          REMOTE_SCRIPT="$(mktemp)"
          {
            echo 'set -e'
            for var in $DEPLOY_VARS; do
              printf 'export %s=%q\n' "$var" "${!var-}"
            done
            cat <<'REMOTE_SCRIPT_BODY'
            docker load -i "$TARGET/$APP_NAME.tar"
            docker rm -f "$APP_NAME" 2>/dev/null || true

            ENV_FILE_ARG=""
            if [ -f "$TARGET/.env" ]; then
              ENV_FILE_ARG="--env-file $TARGET/.env"
            fi

            NETWORK_ARG=""
            if [ -n "$DOCKER_NETWORK" ]; then
              NETWORK_ARG="--network $DOCKER_NETWORK"
            fi

            docker run -d \
              --name "$APP_NAME" \
              --restart unless-stopped \
              $ENV_FILE_ARG \
              $NETWORK_ARG \
              -p "$APP_PORT:3000" \
              "$IMAGE_NAME:latest"

            rm -f "$TARGET/$APP_NAME.tar"
          REMOTE_SCRIPT_BODY
          } > "$REMOTE_SCRIPT"

          ssh -p "$HETZNER_PORT" \
            -i "$KEY_FILE" \
            -o StrictHostKeyChecking=no \
            "root@$HETZNER_HOST" \
            'bash -s' < "$REMOTE_SCRIPT"
